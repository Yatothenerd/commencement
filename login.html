<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Commencement 2026</title>
  <meta name="description" content="Admin login for Paragon.U Commencement 2026 Guest Link Manager.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="/4x/icons/Logo_16x16.svg">
  <link rel="icon" type="image/svg+xml" sizes="32x32" href="/4x/icons/Logo_32x32.svg">
  <link rel="icon" type="image/svg+xml" sizes="48x48" href="/4x/icons/Logo_48x48.svg">
  <link rel="icon" type="image/svg+xml" sizes="60x60" href="/4x/icons/Logo_60x60.svg">
  <link rel="icon" type="image/svg+xml" sizes="72x72" href="/4x/icons/Logo_72x72.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=IM+Fell+English:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/login.css">
</head>

<body>

  <!-- ══ Ambient particles (decorative) ══ -->
  <div class="particles" aria-hidden="true">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- ══ LOGIN CARD ══ -->
  <main class="login-wrapper">
    <div class="login-card">

      <!-- Logo / Branding -->
      <div class="login-brand">
        <div class="brand-icon">
          <img src="4x/logo.png" alt="Paragon International University">
        </div>
        <h1 class="brand-title">Guest Link Manager</h1>
        <p class="brand-subtitle">Paragon.U Commencement 2026</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" autocomplete="off">
        <div class="input-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input type="text" id="username" name="username" placeholder="Enter username" required
              autocomplete="username">
          </div>
        </div>

        <div class="input-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="password" name="password" placeholder="Enter password" required
              autocomplete="current-password">
            <button type="button" class="toggle-password" id="togglePassword" tabindex="-1"
              aria-label="Toggle password visibility">
              <svg class="eye-open" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" style="display:none">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Error message -->
        <div class="login-error" id="loginError"></div>

        <!-- Submit -->
        <button type="submit" class="btn-login" id="submitBtn">
          <span id="btnText">Sign In</span>
          <div class="btn-spinner" id="btnLoader" style="display:none">
            <div class="spinner"></div>
          </div>
        </button>
      </form>

      <div class="login-footer">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        <span>Secured access · Admin only</span>
      </div>

    </div>
  </main>

  <script src="js/login.js"></script>
</body>

</html>
