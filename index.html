<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commencement Ceremony 2026</title>
  <meta name="description"
    content="You are cordially invited to the Paragon International University Commencement Ceremony for the Class of 2026.">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" sizes="16x16" href="/4x/icons/Logo_16x16.svg">
  <link rel="icon" type="image/svg+xml" sizes="32x32" href="/4x/icons/Logo_32x32.svg">
  <link rel="icon" type="image/svg+xml" sizes="48x48" href="/4x/icons/Logo_48x48.svg">
  <link rel="icon" type="image/svg+xml" sizes="60x60" href="/4x/icons/Logo_60x60.svg">
  <link rel="icon" type="image/svg+xml" sizes="72x72" href="/4x/icons/Logo_72x72.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=IM+Fell+English:ital@0;1&display=swap"
    rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/invitation.css">
  <link rel="stylesheet" href="css/invitation-v2.css">

  <!-- Open Graph Meta -->
  <meta property="og:title" content="Paragon International University Commencement Ceremony 2026" />
  <meta property="og:description"
    content="Join us in celebrating the Class of 2026 on Saturday, August 15, 2026, at 2:30 PM at Sokha Hotel, Phnom Penh." />
  <meta property="og:image" content="https://commencement-chi.vercel.app/thumb.png />
  <meta property=" og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://commencement-chi.vercel.app" />
  <meta property="og:site_name" content="Paragon International University" />

  <!-- Twitter Card Meta -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Commencement Ceremony 2026" />
  <meta name="twitter:description" content="Celebrate the Class of 2026 with us at Sokha Hotel, Phnom Penh." />
  <meta name="twitter:image" content="https://commencement-chi.vercel.app/thumb.png" />



</head>

<body>

  <!-- Dynamic container for Envelope -->
  <div id="envelope-container"></div>

  <!-- ════════════════════════ INVITATION ════════════════════════ -->
  <div class="invitation-section" id="invSection">
    <div class="card-wrap">
      <div id="invitation-container"></div>
      <!-- <div id="program-container"></div> -->
    </div>
  </div>

  <!-- Audio: drop your files into the audio/ folder -->
  <audio id="bgMusic" src="audio/music.mp3" loop preload="auto"></audio>
  <audio id="sealSound" src="audio/seal.mp3" preload="auto"></audio>

  <!-- Floating music play/pause button -->
  <button id="musicToggle" class="music-btn" onclick="toggleMusic()" aria-label="Play or pause music" hidden>
    <svg class="ic-play" viewBox="0 0 24 24">
      <polygon points="7 4 20 12 7 20 7 4" />
    </svg>
    <svg class="ic-pause" viewBox="0 0 24 24">
      <rect x="6" y="5" width="4" height="14" />
      <rect x="14" y="5" width="4" height="14" />
    </svg>
  </button>

  <script src="components/envelope.js"></script>
  <script src="components/invitation-v2.js"></script>
  <script src="components/program.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/invitation.js"></script>
</body>

</html>
